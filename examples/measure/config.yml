mesh_density: COARSE
parameters_file: parameters.txt
# Required by the global SimToPC config schema. The `measure` stage writes its
# case-specific outputs inside each `COARSE/test_case_i/` directory.
output_dir: results
running_on : Xenosim

measure:
  y_begin : 100e-6
  y_end : 700e-6
  x_min : 0
  x_max : 0.0002
  cell_size : 2.5e-06
  min_points_per_zrow: 4
  trim:
    enabled: false
    start_spot_sizes: 0.0
    end_spot_sizes: 0.0

environment:
  hostname:  "xenosim"
  run_address: "/home/simon/run/"
  of_location: "$HOME/OpenFOAM/OpenFOAM-v2412/etc/bashrc"
